apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudpilot-ai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/cloudpilot-ai/platform.git'
    targetRevision: HEAD
    path: helm/cloudpilot-ai
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
