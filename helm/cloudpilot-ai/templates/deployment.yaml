apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cloudpilot-ai.fullname" . }}-config
data:
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ include "cloudpilot-ai.fullname" . }}-db:5432/{{ .Values.postgres.database }}"
  REDIS_URL: "redis://{{ include "cloudpilot-ai.fullname" . }}-cache:{{ .Values.redis.port }}/0"
  ENCRYPTION_KEY: {{ .Values.encryptionKey | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudpilot-ai.fullname" . }}-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "cloudpilot-ai.fullname" . }}-api
  template:
    metadata:
      labels:
        app: {{ include "cloudpilot-ai.fullname" . }}-api
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        envFrom:
        - configMapRef:
            name: {{ include "cloudpilot-ai.fullname" . }}-config
        ports:
        - containerPort: {{ .Values.backend.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudpilot-ai.fullname" . }}-api
spec:
  ports:
  - port: {{ .Values.backend.service.port }}
  selector:
    app: {{ include "cloudpilot-ai.fullname" . }}-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudpilot-ai.fullname" . }}-ui
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "cloudpilot-ai.fullname" . }}-ui
  template:
    metadata:
      labels:
        app: {{ include "cloudpilot-ai.fullname" . }}-ui
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.frontend.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudpilot-ai.fullname" . }}-ui
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
  - port: {{ .Values.frontend.service.port }}
  selector:
    app: {{ include "cloudpilot-ai.fullname" . }}-ui
