version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudpilot-db
    environment:
      POSTGRES_USER: cloudpilot
      POSTGRES_PASSWORD: SecretPassword123!
      POSTGRES_DB: cloudpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cloudpilot-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudpilot-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://cloudpilot:SecretPassword123!@postgres:5432/cloudpilot
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=SGVsbG9Xb3JsZFNlY3JldEtleUZvckNyeXB0b2dyYXBoeTMyQnl0ZXM=
      - JWT_SECRET=super_secret_jwt_sign_key_change_me_in_production_32_chars_or_more
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudpilot-worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://cloudpilot:SecretPassword123!@postgres:5432/cloudpilot
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=SGVsbG9Xb3JsZFNlY3JldEtleUZvckNyeXB0b2dyYXBoeTMyQnl0ZXM=
      - JWT_SECRET=super_secret_jwt_sign_key_change_me_in_production_32_chars_or_more
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudpilot-ui
    ports:
      - "80:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: cloudpilot-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.3.3
    container_name: cloudpilot-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
