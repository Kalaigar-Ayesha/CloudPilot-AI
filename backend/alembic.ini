# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# prepend the current directory to sys.path so that env.py can find the app package
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator; defaults to os.pathsep
# version_path_separator = :

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty migrations to be created
# write_empty = false

sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/cloudpilot

[post_write_hooks]
# post_write_hooks defines scripts or cleanups to run after write revision

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
